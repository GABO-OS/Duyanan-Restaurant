spring.application.name=backend

# ── H2 File-Based Database (Persistent) ──────────────────────
# Data is saved to disk so it survives server restarts
spring.datasource.url=jdbc:h2:file:./data/duyanan_db;DB_CLOSE_DELAY=-1
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# ── JPA / Hibernate ──────────────────────────────────────────
# Hibernate 7+ requires dialect to be set explicitly for file-based H2
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# ── CORS (allow frontend to call the backend) ─────────────────
spring.web.cors.allowed-origins=*

# ── JWT Configuration ─────────────────────────────────────────
jwt.secret=DuyananRestaurantSuperSecretKeyForJWT2026!MustBe32+Chars
jwt.expiration=86400000
