spring.application.name=backend

# ── MySQL Database (XAMPP) ────────────────────────────────────
spring.datasource.url=jdbc:mysql://localhost:3306/duyanan_db?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Manila
spring.datasource.driverClassName=com.mysql.cj.jdbc.Driver
spring.datasource.username=root
spring.datasource.password=

# ── JPA / Hibernate ──────────────────────────────────────────
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# ── CORS (allow frontend to call the backend) ─────────────────
spring.web.cors.allowed-origins=*

# ── JWT Configuration ─────────────────────────────────────────
jwt.secret=DuyananRestaurantSuperSecretKeyForJWT2026!MustBe32+Chars
jwt.expiration=86400000

# ── Mail / SMTP (Gmail) ───────────────────────────────────────
# Replace with your Gmail address and App Password
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=YOUR_GMAIL@gmail.com
spring.mail.password=YOUR_APP_PASSWORD
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true
